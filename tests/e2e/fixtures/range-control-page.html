<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Range Control Workspace</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      body {
        margin: 0;
        background: #f6f8fb;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 38px;
      }

      p {
        max-width: 640px;
        font-size: 17px;
        line-height: 1.55;
      }

      form {
        display: grid;
        gap: 20px;
        margin-top: 28px;
        padding: 24px;
        border: 1px solid #cad2df;
        border-radius: 10px;
        background: #fff;
      }

      label,
      .field {
        display: grid;
        gap: 8px;
        font-weight: 700;
      }

      input {
        width: 180px;
        min-height: 40px;
        padding: 8px 10px;
        border: 1px solid #b9c3d5;
        border-radius: 6px;
        font: inherit;
      }

      [role="slider"] {
        position: relative;
        width: 360px;
        height: 24px;
        border-radius: 999px;
        background: #dbe4f0;
        outline-offset: 4px;
      }

      [role="slider"]::before {
        position: absolute;
        top: 50%;
        left: calc(var(--value, 60) * 1%);
        width: 22px;
        height: 22px;
        border: 2px solid #2563eb;
        border-radius: 50%;
        background: #fff;
        content: "";
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Range Control Workspace</h1>
      <p>
        This page models controls whose values change through keyboard actions,
        including a custom ARIA slider and a native numeric spinbutton.
      </p>

      <form aria-label="Range controls">
        <div class="field">
          <span id="confidence-label">Confidence threshold</span>
          <div
            data-testid="confidence-slider"
            role="slider"
            tabindex="0"
            aria-labelledby="confidence-label"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="60"
            aria-valuetext="60 percent"
            aria-valuestep="5"
            style="--value: 60"
          ></div>
        </div>

        <label>
          Retry count
          <input name="retry-count" type="number" min="1" max="10" step="1" value="2" />
        </label>
      </form>
    </main>

    <script>
      const slider = document.querySelector('[data-testid="confidence-slider"]');

      const updateSlider = (value) => {
        const nextValue = Math.max(0, Math.min(100, value));
        slider.setAttribute('aria-valuenow', String(nextValue));
        slider.setAttribute('aria-valuetext', `${nextValue} percent`);
        slider.style.setProperty('--value', String(nextValue));
      };

      slider.addEventListener('keydown', (event) => {
        const currentValue = Number(slider.getAttribute('aria-valuenow') || '0');
        if (event.key === 'ArrowRight') {
          event.preventDefault();
          updateSlider(currentValue + 5);
        } else if (event.key === 'ArrowLeft') {
          event.preventDefault();
          updateSlider(currentValue - 5);
        }
      });
    </script>
  </body>
</html>
