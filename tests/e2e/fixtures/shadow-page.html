<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Shadow DOM Host</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f9fc;
        color: #172033;
      }

      body {
        margin: 0;
        background: #f7f9fc;
      }

      main {
        max-width: 840px;
        margin: 0 auto;
        padding: 56px 32px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 38px;
      }

      p {
        font-size: 17px;
        line-height: 1.55;
      }

      qa-status-card {
        display: block;
        width: 100%;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shadow DOM Host</h1>
      <p>
        The key status card below renders its meaningful browser state inside an
        open shadow root.
      </p>
      <qa-status-card aria-label="QA status web component"></qa-status-card>
    </main>

    <script>
      customElements.define('qa-status-card', class extends HTMLElement {
        connectedCallback() {
          if (this.shadowRoot) {
            return;
          }

          const root = this.attachShadow({ mode: 'open' });
          root.innerHTML = `
            <style>
              .card {
                padding: 18px;
                border: 1px solid #94a3b8;
                border-radius: 8px;
                background: #ffffff;
                color: #172033;
                font-family: Arial, Helvetica, sans-serif;
              }

              h2 {
                margin: 0 0 10px;
                font-size: 24px;
              }

              p {
                margin: 8px 0;
                font-size: 16px;
                line-height: 1.5;
              }

              form {
                display: grid;
                gap: 12px;
                max-width: 460px;
                margin-top: 16px;
              }

              label {
                display: grid;
                gap: 6px;
                font-size: 15px;
                font-weight: 700;
              }

              input {
                min-height: 36px;
                border: 1px solid #94a3b8;
                border-radius: 6px;
                padding: 0 10px;
                font: inherit;
              }

              [role="listbox"] {
                display: grid;
                gap: 6px;
                max-width: 460px;
                margin-top: 16px;
                padding: 8px;
                border: 1px solid #94a3b8;
                border-radius: 8px;
              }

              [role="option"] {
                padding: 7px 9px;
                border-radius: 6px;
                font-size: 15px;
              }

              [aria-selected="true"],
              [role="option"][id="shadow-apac-option"] {
                background: #e5edff;
              }

              table {
                width: 100%;
                max-width: 560px;
                margin-top: 16px;
                border-collapse: collapse;
                font-size: 15px;
              }

              caption {
                margin-bottom: 6px;
                font-weight: 700;
                text-align: left;
              }

              th,
              td {
                border: 1px solid #94a3b8;
                padding: 7px 9px;
                text-align: left;
              }

              figure {
                max-width: 560px;
                margin: 16px 0 0;
              }

              figure img,
              video {
                display: block;
                width: 180px;
                height: 72px;
                object-fit: cover;
                border: 1px solid #94a3b8;
                border-radius: 8px;
                background: #e5edff;
              }

              figcaption {
                margin-top: 6px;
                font-size: 14px;
                font-weight: 700;
              }
            </style>
            <section class="card">
              <h2>Web Component QA Panel</h2>
              <p>Shadow status: Candidate build ready.</p>
              <p data-testid="shadow-selection-insight">
                Selected shadow insight: open shadow selections should reach Aid.
              </p>
              <p>Shadow API key sk-live-shadow-secret123</p>
              <p>Next step: run browser context regression.</p>
              <p>
                <a href="/shadow/checklist?token=secret-shadow-action#private">Open shadow checklist</a>
              </p>
              <button type="button" aria-expanded="false">Run shadow check</button>
              <ul aria-label="Shadow release checklist">
                <li>
                  <label>
                    <input type="checkbox" checked />
                    Shadow smoke test complete
                  </label>
                </li>
                <li>
                  <label>
                    <input type="checkbox" />
                    Shadow security review pending
                  </label>
                </li>
                <li aria-current="step">Shadow list secret sk-live-shadow-list-secret123</li>
              </ul>
              <div
                role="listbox"
                aria-label="Shadow release region"
                aria-activedescendant="shadow-apac-option"
              >
                <div id="shadow-emea-option" role="option" aria-selected="true">Shadow EMEA rollout</div>
                <div id="shadow-apac-option" role="option">Shadow APAC rollout</div>
                <div id="shadow-secret-option" role="option">Shadow secret sk-live-shadow-choice-secret123</div>
              </div>
              <table>
                <caption>Shadow release table</caption>
                <thead>
                  <tr>
                    <th>Region</th>
                    <th>Status</th>
                    <th>Note</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>EMEA</td>
                    <td>Ready</td>
                    <td>sk-live-shadow-table-secret123</td>
                  </tr>
                  <tr>
                    <td>APAC</td>
                    <td>Waiting</td>
                    <td>No blocker</td>
                  </tr>
                </tbody>
              </table>
              <figure>
                <img
                  src="/media/shadow-diagram.png?token=secret-shadow-media#private"
                  alt="Shadow architecture diagram"
                />
                <figcaption>Shadow launch diagram</figcaption>
              </figure>
              <video
                aria-label="Shadow walkthrough video"
                poster="/media/shadow-walkthrough.jpg?signature=secret-shadow-poster#private"
              ></video>
              <form aria-label="Shadow release controls">
                <label>
                  Shadow approval
                  <input name="shadow-approval" autocomplete="off" />
                </label>
                <label>
                  Shadow API token
                  <input name="shadow-token" type="password" />
                </label>
              </form>
            </section>
          `;
        }
      });
    </script>
  </body>
</html>
