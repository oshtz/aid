<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Attachment Console</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f8fafc;
        color: #172033;
      }

      body {
        margin: 0;
        background: #f8fafc;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 36px;
      }

      form,
      label {
        display: grid;
        gap: 10px;
      }

      form {
        margin-top: 24px;
      }

      p,
      label,
      input {
        font-size: 16px;
        line-height: 1.45;
      }

      input {
        max-width: 420px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Attachment Console</h1>
      <p>
        Uploading a release attachment should be visible in Aid browser context
        without exposing local file paths.
      </p>

      <form>
        <label>
          Launch attachment
          <input data-testid="launch-attachment" type="file" />
        </label>
      </form>
    </main>
  </body>
</html>
