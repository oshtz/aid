<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Embedded Frame Host</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f9fc;
        color: #172033;
      }

      body {
        margin: 0;
        background: #f7f9fc;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 56px 32px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 38px;
      }

      p {
        font-size: 17px;
        line-height: 1.55;
      }

      iframe {
        display: block;
        width: 100%;
        height: 900px;
        margin-top: 24px;
        border: 1px solid #94a3b8;
        border-radius: 8px;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Embedded Frame Host</h1>
      <p>
        The host page keeps the QA report inside a visible same-origin iframe,
        which should be included in Aid browser context.
      </p>
      <iframe
        title="Embedded QA report frame"
        src="/frame-child.html?session=secret-frame-token#private"
      ></iframe>
    </main>
  </body>
</html>
