<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Empty Form Workspace</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f9fc;
        color: #172033;
      }

      body {
        margin: 0;
        background: #f7f9fc;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 38px;
      }

      p {
        max-width: 620px;
        font-size: 17px;
        line-height: 1.55;
      }

      form {
        display: grid;
        gap: 18px;
        margin-top: 28px;
        padding: 24px;
        border: 1px solid #cad2df;
        border-radius: 10px;
        background: #fff;
      }

      label {
        display: grid;
        gap: 7px;
        font-weight: 700;
      }

      input,
      textarea {
        min-height: 40px;
        padding: 9px 11px;
        border: 1px solid #b9c3d5;
        border-radius: 6px;
        font: inherit;
      }

      textarea {
        min-height: 90px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Empty Form Workspace</h1>
      <p>
        This fixture verifies Aid can describe visible form fields before the
        user has entered any values.
      </p>

      <form aria-label="Blank launch form">
        <label>
          Launch title
          <input name="title" autocomplete="off" placeholder="e.g. Apollo rollout" />
        </label>

        <label>
          Release notes
          <textarea name="notes" placeholder="Paste sk-live-placeholder-value123 here"></textarea>
        </label>

        <input
          aria-label="Project search"
          name="project-search"
          type="search"
          placeholder="Search projects"
          autocomplete="off"
        />
      </form>
    </main>
  </body>
</html>
